services:
  postgres:
    image: postgres:16
    container_name: dbdemo-postgres
    environment:
      POSTGRES_DB: dbdemo
      POSTGRES_USER: dbdemo
      POSTGRES_PASSWORD: dbdemo
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
