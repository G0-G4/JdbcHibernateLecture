spring:
  application:
    name: dbdemo
  datasource:
    url: jdbc:postgresql://localhost:5432/dbdemo
    username: dbdemo
    password: dbdemo
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
    show-sql: true
  sql:
    init:
      mode: always

logging:
  level:
    org.hibernate.SQL: debug
